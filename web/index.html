<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="theme-color">
    <!--
      This viewport works for phones with notches.
      It's optimized for gestures by disabling global zoom.
     -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, viewport-fit=cover"
    />
    <!--
      Preconnect to essential domains
    -->
    <link rel="preconnect" href="https://bsky.social">
    <link rel="preconnect" href="https://go.bsky.app">
    <title>%WEB_TITLE%</title>

    <link rel="preload" as="font" type="font/woff2" href="/static/media/InterVariable.c504db5c06caaf7cdfba.woff2" crossorigin>
    <link rel="stylesheet" href="/static/style.css">

    <style>
      /**
       * Minimum styles required to render splash.
       *
       * ALL OTHER STYLES BELONG IN `src/style.css`
       *
       * THIS NEEDS TO BE DUPLICATED IN `bskyweb/templates/base.html`
       */
      @font-face {
        font-family: 'InterVariable';
        src: url(/static/media/InterVariable.c504db5c06caaf7cdfba.woff2) format('woff2');
        font-weight: 300 1000;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'InterVariableItalic';
        src: url(/static/media/InterVariable-Italic.01dcbad1bac635f9c9cd.woff2) format('woff2');
        font-weight: 300 1000;
        font-style: italic;
        font-display: swap;
      }
      html,
      body {
        margin: 0px;
        padding: 0px;
        font-family: InterVariable, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Liberation Sans', Helvetica, Arial, sans-serif;
        text-rendering: optimizeLegibility;
        /* Platform-specific reset */
        -webkit-overflow-scrolling: touch;
        -webkit-text-size-adjust: 100%;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        -ms-overflow-style: scrollbar;
        font-synthesis-weight: none;
      }
      :root {
        --text: black;
        --background: white;
        --backgroundLight: #e2e7ee;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --text: white;
          --background: black;
          --backgroundLight: #232e3e;
        }
      }
      html,
      body,
      #root {
        display: flex;
        flex: 1 0 auto;
        min-height: 100%;
        width: 100%;
      }
      html.theme--light,
      html.theme--light body,
      html.theme--light #root {
        background-color: white;
        --text: black;
        --background: white;
        --backgroundLight: #DCE2EA;
      }
      html.theme--dark,
      html.theme--dark body,
      html.theme--dark #root {
        color-scheme: dark;
        background-color: black;
        --text: white;
        --background: black;
        --backgroundLight: #232E3E;
      }
      html.theme--dim,
      html.theme--dim body,
      html.theme--dim #root {
        color-scheme: dark;
        background-color: #151D28;
        --text: white;
        --background: #151D28;
        --backgroundLight: #2C3A4E;
      }
      #splash {
        display: flex;
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        align-items: center;
        justify-content: center;
      }
      #splash svg {
        position: relative;
        top: -50px;
        width: 100px;
      }
      /**
       * We need these styles to prevent shifting due to scrollbar show/hide on
       * OSs that have them enabled by default. This also handles cases where the
       * screen wouldn't otherwise scroll, and therefore hide the scrollbar and
       * shift the content, by forcing the page to show a scrollbar.
       */
      body {
        width: 100%;
        overflow-y: scroll;
      }
    </style>
    <script>
      const theme = localStorage.getItem('ALF_THEME')
      if (theme) {
        document.documentElement.classList.add(`theme--${theme}`)
      }
    </script>
  </head>

  <body>
    <!--
      A generic no script element with a reload button and a message.
      Feel free to customize this however you'd like.
    -->
    <noscript>
      <form
        action=""
        style="
          background-color: #fff;
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          z-index: 9999;
        "
      >
        <div
          style="
            font-size: 18px;
            font-family: Helvetica, sans-serif;
            line-height: 24px;
            margin: 10%;
            width: 80%;
          "
        >
          <p lang="en">Oh no! It looks like JavaScript is not enabled in your browser.</p>
          <p lang="en" style="margin: 20px 0;">
            <button
              type="submit"
              style="
                background-color: #4630eb;
                border-radius: 100px;
                border: none;
                box-shadow: none;
                color: #fff;
                cursor: pointer;
                font-weight: bold;
                line-height: 20px;
                padding: 6px 16px;
              "
            >
              Reload
            </button>
          </p>
        </div>
      </form>
    </noscript>

    <!-- The root element for your Expo app. -->
    <div id="splash">
      <!-- One mark: black ink-brush windmill on a cream "paper" tile -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="10" fill="#F4F0E8"/><path d="M3.42 56.52 L30.74 51.77 L49.33 53.28 L46.25 52.27 L60.58 55.13 L49.61 51.54 L35 49.97 L34.32 42.86 L31.69 43.48 L31.47 49.97 L25.48 50.37 L29.06 35.02 L28.5 31.33 L24.24 50.48Z M18.76 9.04 L18.7 10.44 L32.03 22.87 L32.14 25 L22.12 33.74 L22.01 32.56 L18.37 35.08 L19.65 34.52 L21.45 37.82 L32.53 25.56 L35 25.39 L44.51 36.09 L42.33 34.8 L44.68 37.99 L47.82 36.7 L35.33 25.22 L35.05 22.48 L32.31 22.37 L23.8 11.34 L29.23 16.32 L22.51 7.87Z M47.76 10.05 L46.98 10.5 L46.92 10.05 L37.01 19.18 L35.33 21.03 L36 21.42 L35.72 21.87 L36.34 21.87 L46.64 14.03 L45.8 15.48 L48.32 13.52 L48.88 13.41 L48.49 13.91 L49.44 13.69 L48.83 13.13 L49.05 12.57 L48.43 12.63 L48.43 11.06 L46.81 11.73 L47.2 11.17 L46.87 10.95Z M37.29 30.82 L37.91 36.76 L40.54 48.8 L41.32 49.41 L41.21 46.45 L42.11 49.58 L39.14 34.8Z" fill="#1A1511"/></svg>
    </div>
    <div id="root">
    </div>
  </body>
</html>
